name: id_diagnostic_app
description: Диагностика потенциала личности
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Для базы данных (Hive работает на всех платформах)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Утилиты
  path: ^1.9.0
  intl: ^0.18.1
  flutter_markdown: ^0.7.7+1
  universal_html: ^2.3.0
  video_player: ^2.10.1
  chewie: ^1.13.0
  video_player_win: ^3.2.2
  share_plus: ^12.0.1
  webview_flutter: ^4.13.0
  url_launcher: ^6.3.2
  file_picker: ^10.3.8
  universal_io: ^2.3.1
  path_provider: ^2.1.5
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Для генерации адаптеров Hive
  hive_generator: ^1.1.3
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/cards/
    - assets/data/
    - assets/templates/
    - video/
  fonts:
    - family: DINPro
      fonts:
        - asset: assets/fonts/DINPro-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21 # android min sdk min:16, default 21